upstream ng_soar_frontend {
    server soarca-gui:8081;
}

upstream cacao_roaster {
    server cacao-roaster:3000;
}

upstream soarca_gui {
    server soarca-gui:8081;
}

upstream soarca_api {
    server soarca:8080;
}

upstream ng_soar_api {
    server ng-soar-api:3001;
}

server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 ipv6=off valid=10s;

    location = /api/ng-soar {
        return 302 /api/ng-soar/;
    }

    location /api/ng-soar/ {
        set $ng_soar_api_url http://ng-soar-api:3001;
        rewrite ^/api/ng-soar/(.*)$ /$1 break;
        proxy_pass $ng_soar_api_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/soarca/ {
        set $soarca_api_url http://soarca:8080;
        rewrite ^/api/soarca/(.*)$ /$1 break;
        proxy_pass $soarca_api_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /_roaster {
        return 302 /_roaster/;
    }

    location /_roaster/ {
        set $cacao_roaster_url http://cacao-roaster:3000;
        rewrite ^/_roaster/(.*)$ /$1 break;
        proxy_pass $cacao_roaster_url;
        proxy_http_version 1.1;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-Prefix /roaster;
        add_header Cache-Control "no-store";
        sub_filter_once off;
        sub_filter 'src="/' 'src="/_roaster/';
        sub_filter 'href="/' 'href="/_roaster/';
    }

    location ~ "^/(bundle\.[^/]+\.js|main\.[^/]+\.hot-update\.(js|json)|[0-9a-f]{16,}\.(png|svg|ttf|woff2?|eot))$" {
        set $cacao_roaster_url http://cacao-roaster:3000;
        proxy_pass $cacao_roaster_url$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ~ ^/assets/(cacao|icons|tlp|agent)/ {
        set $cacao_roaster_url http://cacao-roaster:3000;
        proxy_pass $cacao_roaster_url$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ~ ^/assets/(diagram-js(-minimap)?\.css|logo(_with_text)?\.png)$ {
        set $cacao_roaster_url http://cacao-roaster:3000;
        proxy_pass $cacao_roaster_url$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /ws {
        set $cacao_roaster_url http://cacao-roaster:3000;
        proxy_pass $cacao_roaster_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /_executions {
        return 302 /_executions/;
    }

    location /_executions/ {
        set $soarca_gui_url http://soarca-gui:8081;
        rewrite ^/_executions/(.*)$ /$1 break;
        proxy_pass $soarca_gui_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-Prefix /executions;
    }

    location / {
        set $ng_soar_frontend_url http://soarca-gui:8081;
        proxy_pass $ng_soar_frontend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
