services:
  reverse-proxy:
    image: nginx:1.29-alpine
    depends_on:
      - ng-soar-api
      - cacao-roaster
      - soarca-gui
      - soarca
    ports:
      - "${NG_SOAR_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  ng-soar-api:
    build:
      context: ./apps/ng-soar-api
    environment:
      PORT: 3001
      MONGODB_URI: ${NG_SOAR_MONGODB_URI:-mongodb://root:rootpassword@mongodb:27017/?authSource=admin}
      MONGODB_DATABASE: ${NG_SOAR_MONGODB_DATABASE:-ng_soar}
      SOARCA_API_URL: ${SOARCA_API_URL:-http://soarca:8080}
      SYNC_INTERVAL_MS: ${NG_SOAR_SYNC_INTERVAL_MS:-10000}
    depends_on:
      - mongodb
      - soarca

  cacao-roaster:
    build:
      context: ./apps/CACAO-Roaster
    environment:
      SOARCA_URL: ${ROASTER_SOARCA_API_BASE:-/api/soarca}
      SOARCA_END_POINT: ${ROASTER_SOARCA_API_BASE:-/api/soarca}
      SOARCA_PLAYBOOK_API_BASE: ${ROASTER_SOARCA_API_BASE:-/api/soarca}
    ports:
      - "127.0.0.1:${CACAO_ROASTER_PORT:-3000}:3000"
    depends_on:
      - soarca

  soarca-gui:
    build:
      context: ./apps/SOARCA-GUI
    environment:
      NGINX_SERVER_PORT: 8081
      NGINX_BACKEND_URL: http://soarca:8080/
      SOARCA_URI: http://soarca:8080
    ports:
      - "127.0.0.1:${SOARCA_GUI_PORT:-8081}:8081"
    depends_on:
      - soarca

  soarca:
    image: cossas/soarca:latest
    environment:
      PORT: 8080
      SOARCA_ALLOWED_ORIGINS: "*"
      GIN_MODE: release
      MONGODB_URI: mongodb://mongodb:27017
      DATABASE_NAME: soarca
      DB_USERNAME: root
      DB_PASSWORD: rootpassword
      DATABASE: "true"
      LOG_GLOBAL_LEVEL: info
      LOG_MODE: production
      LOG_FILE_PATH: ""
      LOG_FORMAT: json
      ENABLE_FINS: "true"
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      HTTP_SKIP_CERT_VALIDATION: "false"
    ports:
      - "127.0.0.1:${SOARCA_PORT:-8082}:8080"
    depends_on:
      - mongodb
      - mosquitto

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "127.0.0.1:${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db

  mosquitto:
    image: eclipse-mosquitto:2
    command: ["mosquitto", "-c", "/mosquitto-no-auth.conf"]
    ports:
      - "127.0.0.1:${MQTT_PORT:-1883}:1883"

volumes:
  mongodb_data:
